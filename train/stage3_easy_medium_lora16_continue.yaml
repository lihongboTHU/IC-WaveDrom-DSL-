### data
train_dataset_type: messages
eval_dataset_type: messages
train_dataset_path: ./dataset/train_easy_medium.jsonl
train_dataset_prob: "1.0"
eval_dataset_path: ./dataset/eval_messages.jsonl
eval_dataset_prob: "1.0"
max_seq_len: 16384
padding_free: True
truncate_packing: False
dataloader_num_workers: 8
mix_strategy: concat
template_backend: custom
template: paddleocr_vl

### model
model_name_or_path: PaddlePaddle/PaddleOCR-VL
_attn_implementation: flashmask
lora: true
lora_rank: 16
# Continue training the same rank-16 LoRA learned in Stage 2.
# If your trainer saves checkpoints as checkpoint-xxx, replace this with the latest checkpoint path.
lora_model_path: ./output_lora_stage2_easy
copy_custom_file_list: "configuration_paddleocr_vl.py image_processing_paddleocr_vl.py modeling_paddleocr_vl.py processing_paddleocr_vl.py inference.yml"

### finetuning
stage: VL-SFT
fine_tuning: lora
seed: 23
do_train: true
do_eval: false
per_device_eval_batch_size: 8
per_device_train_batch_size: 8
num_train_epochs: 1
max_steps: -1
max_estimate_samples: 500
eval_steps: 400
evaluation_strategy: "no"
save_steps: 300
save_strategy: steps
logging_steps: 1
gradient_accumulation_steps: 8
logging_dir: ./PaddleOCR-VL-SFT-IC-lora/stage3_logs/
output_dir: ./output_lora_stage3_easy_medium
disable_tqdm: true
eval_accumulation_steps: 16

### train
lr_scheduler_type: cosine
warmup_ratio: 0.02
learning_rate: 5.0e-5
min_lr: 5.0e-6

### optimizer
weight_decay: 0.1
adam_epsilon: 1.0e-8
adam_beta1: 0.9
adam_beta2: 0.95

### performance
tensor_model_parallel_size: 1
pipeline_model_parallel_size: 1
sharding: stage1
recompute_granularity: full
recompute_method: uniform
recompute_num_layers: 1
bf16: true
fp16_opt_level: O2
pre_alloc_memory: 16

### save
unified_checkpoint: false
save_checkpoint_format: "flex_checkpoint"
load_checkpoint_format: "flex_checkpoint"
